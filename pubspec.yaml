name: adaptive_shimmer
description: "The ultimate skeleton loader for Flutter. Zero dependencies, maximum power. Auto-detect widgets, 8 animation directions, custom transformers, collection skeletons, memoization, testing utilities, and complete animation control."
version: 1.2.0
homepage: https://github.com/abhijithsabudev/adaptive_shimmer
repository: https://github.com/abhijithsabudev/adaptive_shimmer
issue_tracker: https://github.com/abhijithsabudev/adaptive_shimmer/issues

environment:
  sdk: '>=3.2.1 <4.0.0'
  flutter: ">=1.17.0"

topics:
  - shimmer
  - skeleton
  - loader
  - animation
  - flutter-widget

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
