name: adaptive_shimmer
description: "A package to give adaptive shimmer effect to your widgets with automatic shape adaptability"
version: 0.1.2

environment:
  sdk: '>=3.2.1 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0


flutter:

  uses-material-design: true
  assets:
    - assets/
    - assets/images/
